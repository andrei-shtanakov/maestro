name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly drift-check against arbiter master (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

env:
  # Pin arbiter to the on-master commit for the <harness>@<model> agent-id
  # convention (arbiter#24). Must match ARBITER_VENDORED_FROM_SHA — the
  # "Verify vendored arbiter_client matches pinned SHA" step enforces it.
  # Bump when the Maestro↔arbiter contract evolves.
  ARBITER_PINNED_SHA: f3c955cd152cab0293195b71bd7e602f00736354

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pyrefly check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      NO_COLOR: "1"
      TERM: "dumb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - name: Configure git identity and default branch
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@maestro.test"
          git config --global user.name "Maestro CI"
      - run: uv sync
      - run: uv run python -m pytest -m "not slow"

  arbiter-e2e:
    name: R-05 real-subprocess (arbiter ${{ github.event_name == 'schedule' && 'master' || 'pinned' }})
    runs-on: ubuntu-latest
    needs: [test]
    env:
      NO_COLOR: "1"
      TERM: "dumb"
    steps:
      - name: Checkout Maestro into sibling layout
        uses: actions/checkout@v4
        with:
          path: Maestro

      - name: Resolve arbiter ref
        id: arbiter_ref
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ref=master" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${ARBITER_PINNED_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout arbiter (${{ steps.arbiter_ref.outputs.ref }})
        uses: actions/checkout@v4
        with:
          repository: andrei-shtanakov/arbiter
          ref: ${{ steps.arbiter_ref.outputs.ref }}
          path: arbiter

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: arbiter
          shared-key: arbiter-mcp-${{ steps.arbiter_ref.outputs.ref }}

      - name: Build arbiter-mcp release binary
        working-directory: arbiter
        run: cargo build --release --bin arbiter-mcp

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Configure git identity and default branch
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@maestro.test"
          git config --global user.name "Maestro CI"

      - name: Install Maestro deps
        working-directory: Maestro
        run: uv sync

      - name: Verify vendored arbiter_client matches pinned SHA
        if: github.event_name != 'schedule'
        working-directory: Maestro
        env:
          ARBITER_PINNED_SHA: ${{ env.ARBITER_PINNED_SHA }}
        run: |
          PYVENDOR_SHA=$(uv run python -c "from maestro.coordination.arbiter_client import ARBITER_VENDORED_FROM_SHA; print(ARBITER_VENDORED_FROM_SHA)")
          if [ "$PYVENDOR_SHA" != "$ARBITER_PINNED_SHA" ]; then
            echo "::error::vendored copy out of sync with pinned arbiter: vendored=$PYVENDOR_SHA, pinned=$ARBITER_PINNED_SHA — re-vendor required"
            exit 1
          fi
          echo "vendored OK: $PYVENDOR_SHA"

      - name: Run real-subprocess tests (R-05 + R-06b M4)
        working-directory: Maestro
        env:
          MAESTRO_ARBITER_BIN: ${{ github.workspace }}/arbiter/target/release/arbiter-mcp
        run: |
          uv run python -m pytest \
            tests/test_arbiter_real_subprocess.py \
            tests/test_arbiter_real_subprocess_benchmark.py \
            -v

      - name: Run benchmark report smoke
        working-directory: Maestro
        env:
          MAESTRO_ARBITER_BIN: ${{ github.workspace }}/arbiter/target/release/arbiter-mcp
        run: uv run python scripts/smoke_benchmark_report.py

  spec-runner-plan-e2e:
    name: C4 golden — spec-runner plan --full (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      # No ANTHROPIC_API_KEY/Claude-auth secret is established in this repo's
      # CI yet (arbiter-e2e above needs none — it never invokes the Claude
      # CLI). This job is wired skip-safe: the actual test step below only
      # runs if the secret exists, so an unconfigured repo shows a skipped
      # step instead of a chronically red weekly job. Add the
      # ANTHROPIC_API_KEY repo/org secret to make this job exercise for real.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Install spec-runner
        run: uv tool install spec-runner
      - name: Run golden drift test
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        env:
          MAESTRO_RUN_GOLDEN: "1"
        run: uv run pytest tests/test_spec_runner_plan_e2e.py -m slow -v
