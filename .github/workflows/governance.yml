# Governance caller (ADR-ECO-004 D5) — pinned reference to the reusable gate workflow in
# ai-orchestrators-workspace. No code is copied here; the immutable @governance-v1 tag is the pin.
# Canon: ai-orchestrators-workspace/ci/governance/ (governance-gate.yml).
name: governance
permissions:
  contents: read          # gate only reads (2× checkout of public repos); least-privilege
on:
  pull_request:
  workflow_dispatch:

jobs:
  governance:
    uses: andrei-shtanakov/ai-orchestrators-workspace/.github/workflows/governance-gate.yml@governance-v1
    with:
      umbrella-ref: "governance-v1"
      strict: true
      runtime-scan: true        # runtime code — GOV-003 applies
      authority-guard: false    # holds no authority-root paths
